<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="120" height="120">
  <!-- Deep Dark Background -->
  <rect width="108" height="108" rx="24" fill="#0C0A12" />
  
  <!-- TV Screen Outline -->
  <rect x="24" y="26" width="60" height="44" rx="8" ry="8" fill="none" stroke="#FFFFFF" stroke-width="4.5" />
  
  <!-- TV Stand -->
  <rect x="49" y="70" width="10" height="8" fill="#FFFFFF" />
  <line x1="38" y1="78" x2="70" y2="78" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" />
  
  <!-- Casting Waves in bottom-left -->
  <circle cx="33" cy="61" r="3.5" fill="#06B6D4" />
  <path d="M33,49 A 12,12 0 0,1 45,61" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" />
  <path d="M33,37 A 24,24 0 0,1 57,61" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" />
  
  <!-- Play Symbol -->
  <polygon points="64,38 78,48 64,58" fill="#8B5CF6" />
</svg>
